  rerender();

  overlay.appendChild(sheet);
  $('#sheet-host').appendChild(overlay);
}

/* ============================================================
   HISTORY PAGE
   ============================================================ */
function renderHistory() {
  const wrap = el('div', { className: 'page' });
  wrap.appendChild(el('h1', {}, 'History'));
  wrap.appendChild(el('p', { className: 'dim', style: 'margin-bottom: 20px;' }, 'Every session you\'ve logged.'));

  if (!state.sessions.length) {
    wrap.appendChild(el('div', { className: 'empty' }, 'No sessions yet. Start a workout to see it here.'));
    return wrap;
  }

  state.sessions.slice().reverse().forEach(s => {
    wrap.appendChild(renderHistoryRow(s));
  });

  return wrap;
}

function renderHistoryRow(s) {
  const totalSets = s.exercises.reduce((a, e) => a + e.sets.filter(x => x.done).length, 0);
  const totalVol = s.exercises.reduce((a, e) => a + e.sets.filter(x => x.done).reduce((b, x) => b + (x.weight || 0) * (x.reps || 0), 0), 0);
  const duration = s.durationSeconds ? Math.round(s.durationSeconds / 60) : null;

  const row = el('div', { className: 'history-row', onclick: () => openHistoryDetail(s.id) });
  const head = el('div', { className: 'history-head' });
  head.appendChild(el('div', { className: 'history-name' }, s.dayName));
  head.appendChild(el('div', { className: 'history-date' }, fmtDate(s.completedAt || s.startedAt)));
  row.appendChild(head);

  const statsLine = el('div', { className: 'history-stats' });
  statsLine.innerHTML = `<span>${s.exercises.length}</span> exercises · <span>${totalSets}</span> sets · <span class="tnum">${totalVol.toLocaleString()}</span> ${state.units}${duration ? ` · <span class="tnum">${duration}</span> min` : ''}`;
  row.appendChild(statsLine);

  return row;
}

function openHistoryDetail(sessionId) {
  const s = state.sessions.find(x => x.id === sessionId);
  if (!s) return;

  const overlay = el('div', { className: 'sheet-overlay', onclick: closeSheet });
  const sheet = el('div', { className: 'sheet', onclick: e => e.stopPropagation() });
  sheet.appendChild(el('div', { className: 'sheet-handle' }));
  sheet.appendChild(el('div', { className: 'sheet-title' }, s.dayName));
  sheet.appendChild(el('div', { className: 'sheet-sub' },
    `${fmtDate(s.completedAt || s.startedAt)} · ${s.routineName || 'Freeform'}${s.durationSeconds ? ' · ' + Math.round(s.durationSeconds / 60) + ' min' : ''}`));

  s.exercises.forEach(ex => {
    const exerciseInfo = getExercise(ex.exerciseId);
    const doneSets = ex.sets.filter(x => x.done);
    if (doneSets.length === 0) return;
    const card = el('div', { className: 'card tight' });
    card.appendChild(el('div', { style: 'font-weight: 700; font-size: 14px;' }, exerciseInfo.name));
    card.appendChild(el('div', { style: 'font-size: 11px; color: var(--text-mute); margin-bottom: 8px;' }, exerciseInfo.muscle));
    doneSets.forEach((set, i) => {
      const setRow = el('div', { style: 'display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px;' });
      setRow.appendChild(el('span', { style: 'color: var(--text-mute); width: 22px;' }, String(i + 1)));
      setRow.appendChild(el('span', { className: 'tnum', style: 'font-weight: 600;' }, String(set.weight)));
      setRow.appendChild(el('span', { className: 'mute' }, '×'));
      setRow.appendChild(el('span', { className: 'tnum', style: 'font-weight: 600;' }, String(set.reps)));
      if (set.rpe) {
        setRow.appendChild(el('span', { className: 'rpe-tag', style: 'margin-left: auto;' }, `RPE ${set.rpe}`));
      }
      card.appendChild(setRow);
    });
    sheet.appendChild(card);
  });

  // Delete button
  sheet.appendChild(el('button', {
    className: 'btn danger block',
    style: 'margin-top: 12px;',
    onclick: () => {
      if (!confirm('Delete this session permanently?')) return;
      state.sessions = state.sessions.filter(x => x.id !== sessionId);
      save();
      closeSheet();
      render();
      toast('Session deleted');
    },
  }, 'Delete session'));

  overlay.appendChild(sheet);
  $('#sheet-host').appendChild(overlay);
}

/* ============================================================
   SETTINGS PAGE
   ============================================================ */
function renderSettings() {
  const wrap = el('div', { className: 'page' });
  wrap.appendChild(el('h1', {}, 'Settings'));
  wrap.appendChild(el('p', { className: 'dim', style: 'margin-bottom: 24px;' }, 'Your data lives in this browser only.'));

  // Units
  const unitsCard = el('div', { className: 'card' });
  unitsCard.appendChild(el('div', { style: 'font-size: 13px; font-weight: 600; margin-bottom: 8px;' }, 'Weight units'));
  const unitsRow = el('div', { style: 'display: flex; gap: 6px;' });
  ['lbs', 'kg'].forEach(u => {
    const btn = el('button', {
      className: 'btn small',
      style: `flex: 1; ${state.units === u ? 'background: var(--accent); color: white; border: none;' : 'background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim);'}`,
      onclick: () => { state.units = u; save(); render(); },
    }, u);
    unitsRow.appendChild(btn);
  });
  unitsCard.appendChild(unitsRow);
  wrap.appendChild(unitsCard);

  // Stats
  const statsCard = el('div', { className: 'card' });
  statsCard.appendChild(el('div', { style: 'font-size: 13px; font-weight: 600; margin-bottom: 8px;' }, 'Your data'));
  statsCard.appendChild(el('div', { className: 'dim', style: 'font-size: 12px;' },
    `${state.sessions.length} sessions · ${state.routines.length} routines · ${state.exercises.length} exercises`));
  wrap.appendChild(statsCard);

  // Exercise library
  wrap.appendChild(el('div', { className: 'section-label' }, 'Exercise library'));
  wrap.appendChild(el('button', {
    className: 'btn ghost block',
    style: 'margin-bottom: 8px;',
    onclick: () => openAddCustomExerciseSheet(null),
  }, '+ Add custom exercise'));
  wrap.appendChild(el('button', {
    className: 'btn ghost block',
    style: 'margin-bottom: 8px;',
    onclick: openManageCustomExercises,
  }, 'Manage custom exercises'));

  // Export / Import
  wrap.appendChild(el('div', { className: 'section-label' }, 'Backup'));
  wrap.appendChild(el('button', {
    className: 'btn ghost block',
    style: 'margin-bottom: 8px;',
    onclick: exportData,
  }, 'Download backup (JSON)'));
  wrap.appendChild(el('button', {
    className: 'btn ghost block',
    style: 'margin-bottom: 8px;',
    onclick: () => document.getElementById('import-file').click(),
  }, 'Restore from backup'));
  const importInput = el('input', { type: 'file', id: 'import-file', accept: '.json', style: 'display: none;' });
  importInput.onchange = importData;
  wrap.appendChild(importInput);

  // Danger
  wrap.appendChild(el('div', { className: 'section-label' }, 'Danger'));
  wrap.appendChild(el('button', {
    className: 'btn danger block',
    style: 'margin-bottom: 8px;',
    onclick: () => {
      if (!confirm('Reset all data? Your routines, sessions, and custom exercises will be deleted.')) return;
      if (!confirm('Really sure? This cannot be undone.')) return;
      localStorage.removeItem(STORAGE_KEY);
      state = load();
      goTab('home');
      toast('Reset complete');
    },
  }, 'Reset all data'));

  // Footer
  wrap.appendChild(el('p', { style: 'text-align: center; font-size: 11px; color: var(--text-mute); margin-top: 32px;' },
    'Forge · v1.0 · built for one'));

  return wrap;
}

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `forge-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const imported = JSON.parse(event.target.result);
      if (!imported.routines || !imported.exercises) throw new Error('Invalid backup');
      if (!confirm('This will replace all your current data. Continue?')) return;
      state = { ...DEFAULT_STATE, ...imported };
      save();
      render();
      toast('Backup restored');
    } catch (err) {
      toast('Invalid backup file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ============================================================
   SHEET / OVERLAY CLOSE
   ============================================================ */
function closeSheet() {
  $('#sheet-host').innerHTML = '';
}

/* ============================================================
   BOOT
   ============================================================ */
window.addEventListener('beforeunload', () => {
  save();
});

// Resume timer if mid-session
if (state.activeSession) {
  startWorkoutTimer();
}

render();
</script>
</body>
</html>
